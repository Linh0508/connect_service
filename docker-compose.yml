networks:
  team-internal:
    driver: bridge
    name: b6-team-network
  class-net:
    name: class-network
    external: false
    driver: bridge

volumes:
  postgres_data:
  audit_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: b6-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-b6_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-b6_password}
      POSTGRES_DB: ${POSTGRES_DB:-b6_core_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - team-internal
      - class-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-b6_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: b6-core-api
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER:-b6_user}:${POSTGRES_PASSWORD:-b6_password}@postgres:5432/${POSTGRES_DB:-b6_core_db}
      DATABASE_DISABLED: ${DATABASE_DISABLED:-false}
      AI_VISION_URL: ${AI_VISION_URL:-http://b6-ai-vision:9000}
      ACCESS_GATE_URL: ${ACCESS_GATE_URL:-http://b3-access-gate:8001}
      ACCESS_GATE_MOCK: ${ACCESS_GATE_MOCK:-true}
      NOTIFICATION_URL: ${NOTIFICATION_URL:-http://b7-notification:8002}
      NOTIFICATION_WEBHOOK_PATH: ${NOTIFICATION_WEBHOOK_PATH:-/webhook/alerts}
      NOTIFICATION_MOCK: ${NOTIFICATION_MOCK:-false}
      ANALYTICS_URL: ${ANALYTICS_URL:-http://b5-analytics:8003}
      ANALYTICS_WEBHOOK_PATH: ${ANALYTICS_WEBHOOK_PATH:-/webhook/decisions}
      ANALYTICS_MOCK: ${ANALYTICS_MOCK:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-mock-secret}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      IDEMPOTENCY_WINDOW_SECONDS: ${IDEMPOTENCY_WINDOW_SECONDS:-60}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-5000}
      # RabbitMQ
      RABBITMQ_HOST: ${RABBITMQ_HOST:-host.docker.internal}  # hoặc IP máy bạn
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-amq.topic}
      RABBITMQ_ROUTING_KEY: ${RABBITMQ_ROUTING_KEY:-core.notification.alerts}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-notification.alerts}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - audit_data:/app/data
    networks:
      - team-internal
      - class-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  ai-vision:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: b6-ai-vision
    restart: unless-stopped
    ports:
      - "9000:9000"
    networks:
      - team-internal
      - class-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s