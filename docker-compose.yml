version: '3.8'

networks:
  team-internal:
    driver: bridge
    name: b6-team-network
  class-net:
    driver: bridge
    name: class-network

volumes:
  postgres_data:
  audit_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: b6-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-b6_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-b6_password}
      POSTGRES_DB: ${POSTGRES_DB:-b6_core_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - team-internal
      - class-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-b6_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: b6-core-api
    restart: unless-stopped
    environment:
      # Server
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: ${DEBUG:-true}
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-b6_user}:${POSTGRES_PASSWORD:-b6_password}@postgres:5432/${POSTGRES_DB:-b6_core_db}
      DATABASE_DISABLED: ${DATABASE_DISABLED:-false}
      
      # B3 - Access Gate
      ACCESS_GATE_URL: ${ACCESS_GATE_URL:-http://b3-access-gate:8001}
      ACCESS_GATE_AUTO_DETECT: ${ACCESS_GATE_AUTO_DETECT:-false}  # TẮT AUTO DETECT
      ACCESS_GATE_TIMEOUT: ${ACCESS_GATE_TIMEOUT:-3.0}
      ACCESS_GATE_RETRY_INTERVAL: ${ACCESS_GATE_RETRY_INTERVAL:-60}
      
      # B4 - AI Vision
      AI_VISION_URL: ${AI_VISION_URL:-http://b4-ai-vision:9000}
      AI_VISION_AUTO_DETECT: ${AI_VISION_AUTO_DETECT:-false}  # TẮT AUTO DETECT
      AI_VISION_RETRY_INTERVAL: ${AI_VISION_RETRY_INTERVAL:-60}
      B4_AI_VISION_URL: ${B4_AI_VISION_URL:-http://b4-ai-vision:9000}
      AI_VISION_FALLBACK_URL: ${AI_VISION_FALLBACK_URL:-http://b6-ai-vision:9000}
      
      # B5 - Analytics
      ANALYTICS_URL: ${ANALYTICS_URL:-http://26.100.91.226:8000}
      ANALYTICS_WEBHOOK_PATH: ${ANALYTICS_WEBHOOK_PATH:-/webhook/decisions}
      ANALYTICS_AUTO_DETECT: ${ANALYTICS_AUTO_DETECT:-false}  # TẮT AUTO DETECT
      ANALYTICS_TIMEOUT: ${ANALYTICS_TIMEOUT:-5.0}
      ANALYTICS_MOCK: ${ANALYTICS_MOCK:-true}
      ANALYTICS_RETRY_INTERVAL: ${ANALYTICS_RETRY_INTERVAL:-60}
      
      # B7 - Notification
      NOTIFICATION_URL: ${NOTIFICATION_URL:-http://26.64.54.49:8000}
      NOTIFICATION_WEBHOOK_PATH: ${NOTIFICATION_WEBHOOK_PATH:-/webhook/alerts}
      NOTIFICATION_AUTO_DETECT: ${NOTIFICATION_AUTO_DETECT:-false}  # TẮT AUTO DETECT
      NOTIFICATION_TIMEOUT: ${NOTIFICATION_TIMEOUT:-5.0}
      NOTIFICATION_MOCK: ${NOTIFICATION_MOCK:-true}
      NOTIFICATION_RETRY_INTERVAL: ${NOTIFICATION_RETRY_INTERVAL:-60}
      
      # RabbitMQ
      RABBITMQ_HOST: ${RABBITMQ_HOST:-26.64.54.49}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-amq.topic}
      RABBITMQ_ROUTING_KEY: ${RABBITMQ_ROUTING_KEY:-notification.alerts}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-notification.alerts}
      RABBITMQ_CONNECTION_TIMEOUT: ${RABBITMQ_CONNECTION_TIMEOUT:-3.0}
      
      # Connection Management
      CONNECTION_RETRY_ENABLED: ${CONNECTION_RETRY_ENABLED:-false}
      CONNECTION_CHECK_TIMEOUT: ${CONNECTION_CHECK_TIMEOUT:-2.0}
      
      # Security & Cache
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-mock-secret}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      IDEMPOTENCY_WINDOW_SECONDS: ${IDEMPOTENCY_WINDOW_SECONDS:-60}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-5000}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      DEFAULT_QUOTA_PER_DAY: ${DEFAULT_QUOTA_PER_DAY:-5}
      RULE_ENGINE_LATENCY_THRESHOLD_MS: ${RULE_ENGINE_LATENCY_THRESHOLD_MS:-150}
      
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - audit_data:/app/data
      - ./src:/app/src  # MOUNT SOURCE CODE CHO DEBUG
    networks:
      - team-internal
      - class-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  ai-vision:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: b6-ai-vision
    restart: unless-stopped
    ports:
      - "9000:9000"
    networks:
      - team-internal
      - class-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s